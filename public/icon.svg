<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#16a34a"/>
  <!-- Arc: 12 o'clock (32,14) clockwise 270° to 9 o'clock (14,32) -->
  <path
    d="M32,14 A18,18,0,1,1,14,32"
    stroke="white"
    stroke-width="4.5"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Arrowhead at 9 o'clock pointing up (direction of clockwise travel) -->
  <polygon points="14,22 9,34 19,34" fill="white"/>
  <!-- Dollar sign, nudged up to visually center inside the arc -->
  <text
    x="32" y="38"
    text-anchor="middle"
    font-family="system-ui,-apple-system,sans-serif"
    font-size="20"
    font-weight="700"
    fill="white"
  >$</text>
</svg>
